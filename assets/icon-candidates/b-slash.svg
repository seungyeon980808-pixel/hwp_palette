<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="hwp_palette — 라벨 문법 워드마크">
  <defs>
    <radialGradient id="bgB" cx="50%" cy="60%" r="72%">
      <stop offset="0%" stop-color="#23366b"/>
      <stop offset="66%" stop-color="#0b1128"/>
    </radialGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#bgB)"/>

  <!-- 이 도구의 시그니처 문법 \라벨\ 을 그대로 마크로. 가운데 칸이 '채울 자리'. -->
  <!-- 백슬래시 둘은 '같은 방향'으로 기운다. 마주보게 그리면 V 로 읽힌다. -->
  <g stroke="#f5f8ff" stroke-width="8" stroke-linecap="round">
    <line x1="26" y1="26" x2="38" y2="70"/>
    <line x1="58" y1="26" x2="70" y2="70"/>
  </g>
  <rect x="43" y="43" width="11" height="11" rx="2.5" fill="#4c9dff"/>
</svg>
